services:

  mongodb:
    image: mongo:7
    container_name: portfolio_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: portfolio_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: portfolio_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data: